<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GRACEFUL DESSERTS</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: serif;
      text-align: center;
      padding: 60px 20px;
    }
    h1 {
      font-size: 48px;
      letter-spacing: 2px;
    }
    .gold {
      color: gold;
    }
    p {
      font-size: 18px;
      margin: 20px 0;
    }
    .jp {
      margin-top: 40px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <h1 class="gold">GRACEFUL DESSERTS</h1>

  <p>
    Ending is not the end.<br>
    It is the beginning of everything.
  </p>

  <p>
    Dessert is not something you eat.<br>
    It is something that completes your life.
  </p>

  <p>
    A new expression of dessert will be born into this world.
  </p>

  <div class="jp">
    <p>
      終わりは終わりではない。<br>
      それは、すべての始まり。
    </p>

    <p>
      デザートは食べるものではない。<br>
      人生を完結させるものだ。
    </p>

    <p>
      新しいデザートの表現が、この世界に生まれる。
    </p>
  </div>

</body>
</html>
